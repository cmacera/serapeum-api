name: Check dependency upgrade blockers

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  check-blockers:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check genkit dependency versions
        id: check
        run: |
          DEPS=$(npm info @genkit-ai/core@latest dependencies --json)

          GENKIT_ZOD=$(echo "$DEPS" | jq -r '.zod // ""')
          GENKIT_OTEL=$(echo "$DEPS" | jq -r '.["@opentelemetry/sdk-node"] // ""')

          echo "genkit_zod=$GENKIT_ZOD"
          echo "genkit_otel=$GENKIT_OTEL"

          # Extract major version number from semver range (e.g. "^4.0.0" → 4)
          ZOD_MAJOR=$(echo "$GENKIT_ZOD" | sed 's/[^0-9]*//' | cut -d'.' -f1)
          # Extract minor version of sdk-node (e.g. "^0.200.0" → 200)
          OTEL_MINOR=$(echo "$GENKIT_OTEL" | sed 's/[^0-9]*//' | cut -d'.' -f2)

          echo "zod_major=$ZOD_MAJOR" >> "$GITHUB_OUTPUT"
          echo "otel_minor=$OTEL_MINOR" >> "$GITHUB_OUTPUT"

      - name: Open issue if zod v4 is unblocked
        if: ${{ steps.check.outputs.zod_major >= 4 }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['dependency-unblocked'],
              state: 'open',
            });

            if (issues.some(i => i.title.includes('zod v4'))) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: genkit now supports zod v4 — re-enable Dependabot upgrades',
              labels: ['dependency-unblocked'],
              body: [
                '## Dependency blocker resolved',
                '',
                `\`@genkit-ai/core\` now depends on \`zod: ${steps.check.outputs.genkit_zod}\`.`,
                '',
                '### Action required',
                '1. Remove the `zod` ignore rule from `.github/dependabot.yml`',
                '2. Remove the `@asteasolutions/zod-to-openapi` ignore rule (v8 requires zod v4)',
                '3. Migrate the codebase to zod v4 (breaking changes: https://zod.dev/v4)',
                '4. Re-run Dependabot for PRs #28 and #74',
              ].join('\n'),
            });

      - name: Open issue if opentelemetry is unblocked
        if: ${{ steps.check.outputs.otel_minor >= 200 }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['dependency-unblocked'],
              state: 'open',
            });

            if (issues.some(i => i.title.includes('opentelemetry'))) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: genkit now supports opentelemetry 2.x — re-enable Dependabot upgrade',
              labels: ['dependency-unblocked'],
              body: [
                '## Dependency blocker resolved',
                '',
                `\`@genkit-ai/core\` now depends on \`@opentelemetry/sdk-node: ${steps.check.outputs.genkit_otel}\`.`,
                '',
                '### Action required',
                '1. Remove the `@opentelemetry/exporter-trace-otlp-http` ignore rule from `.github/dependabot.yml`',
                '2. Reopen Dependabot PR #86 or let Dependabot recreate it',
              ].join('\n'),
            });
