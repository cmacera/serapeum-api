name: Sync OpenAPI spec to Flutter

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared-schemas/**'
      - 'scripts/generate-openapi.ts'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout serapeum-api
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared-schemas package
        run: npm run build -w packages/shared-schemas

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Open PR in serapeum-app if spec changed
        env:
          GH_TOKEN: ${{ secrets.FLUTTER_SYNC_TOKEN }}
        run: |
          APP_REPO="cmacera/serapeum-app"
          FILE_PATH="docs/openapi.yaml"

          # Extract ticket ref from the triggering commit (e.g. "SER-76")
          TICKET=$(echo "${{ github.event.head_commit.message }}" | grep -oP '(?<=\[)(SER-\d+)(?=\])' | head -1 || true)

          # Fetch current file content from app repo
          CURRENT_CONTENT=$(gh api "repos/$APP_REPO/contents/$FILE_PATH" --jq '.content // ""' 2>/dev/null | tr -d '\n' || echo "")

          # Base64-encode the freshly generated spec
          NEW_CONTENT=$(base64 -w0 < docs/openapi.yaml)

          # Exit early if nothing changed
          if [ "$CURRENT_CONTENT" = "$NEW_CONTENT" ]; then
            echo "No OpenAPI spec changes — skipping PR."
            exit 0
          fi

          BRANCH="chore/sync-openapi-$(date +%Y%m%d-%H%M%S)"
          MAIN_SHA=$(gh api "repos/$APP_REPO/git/refs/heads/main" --jq .object.sha)

          # Create branch via REST API
          gh api "repos/$APP_REPO/git/refs" \
            --method POST \
            --field ref="refs/heads/$BRANCH" \
            --field sha="$MAIN_SHA"

          # Create verified commit via GraphQL createCommitOnBranch.
          # Commits made this way are signed by GitHub and pass "Require signed commits".
          gh api graphql -f query='
            mutation($repo: String!, $branch: String!, $headOid: GitObjectID!, $content: Base64String!, $msg: String!) {
              createCommitOnBranch(input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch }
                expectedHeadOid: $headOid
                message: { headline: $msg }
                fileChanges: {
                  additions: [{ path: "docs/openapi.yaml", contents: $content }]
                }
              }) {
                commit { oid }
              }
            }' \
            -f repo="$APP_REPO" \
            -f branch="$BRANCH" \
            -f headOid="$MAIN_SHA" \
            -f content="$NEW_CONTENT" \
            -f msg="chore(openapi): sync spec from serapeum-api"

          # Use real ticket as title prefix; fall back to [SCHEMA] if none found
          TITLE_PREFIX="${TICKET:+[$TICKET]}"
          TITLE_PREFIX="${TITLE_PREFIX:-[SCHEMA]}"

          BODY="Auto-generated by the [sync-flutter workflow](https://github.com/cmacera/serapeum-api/actions/workflows/sync-flutter.yml) in **serapeum-api**."
          BODY="${BODY}"$'\n\n'"⚠️ **Merge this PR before deploying the API or running the local server** to avoid schema mismatches between Flutter client and API."
          BODY="${BODY}"$'\n\nAfter merging, regenerate the Dart DTOs:\n```sh\ndart run build_runner build --delete-conflicting-outputs\n```'

          PR_URL=$(gh pr create \
            --repo "$APP_REPO" \
            --title "$TITLE_PREFIX chore(openapi): sync OpenAPI spec from serapeum-api" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH")

          # Skip CodeRabbit — schema sync PRs are auto-generated, not hand-written code
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          gh api "repos/$APP_REPO/issues/$PR_NUMBER/comments" \
            --method POST \
            --field body="@coderabbitai ignore"

          echo "PR created: $PR_URL"
