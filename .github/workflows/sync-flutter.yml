name: Sync OpenAPI spec to Flutter

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared-schemas/**'
      - 'scripts/generate-openapi.ts'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout serapeum-api
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared-schemas package
        run: npm run build -w packages/shared-schemas

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Checkout serapeum-app
        uses: actions/checkout@v4
        with:
          repository: cmacera/serapeum-app
          token: ${{ secrets.FLUTTER_SYNC_TOKEN }}
          path: serapeum-app

      - name: Copy spec and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.FLUTTER_SYNC_TOKEN }}
        run: |
          mkdir -p serapeum-app/docs
          cp docs/openapi.yaml serapeum-app/docs/openapi.yaml

          cd serapeum-app

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Exit early if there are no changes (handles both tracked and untracked files)
          if [ -z "$(git status --porcelain docs/openapi.yaml)" ]; then
            echo "No OpenAPI spec changes — skipping PR."
            exit 0
          fi

          BRANCH="chore/sync-openapi-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add docs/openapi.yaml
          git commit -m "chore(openapi): sync spec from serapeum-api"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(openapi): sync OpenAPI spec from serapeum-api" \
            --body "$(cat <<'EOF'
          Auto-generated by the [sync-flutter workflow](https://github.com/cmacera/serapeum-api/actions/workflows/sync-flutter.yml) in **serapeum-api**.

          After merging, regenerate the Dart DTOs:
          \`\`\`sh
          dart run build_runner build --delete-conflicting-outputs
          \`\`\`
          EOF
          )" \
            --base main \
            --head "$BRANCH"
