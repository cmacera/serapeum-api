name: Sync OpenAPI spec to Flutter

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared-schemas/**'
      - 'scripts/generate-openapi.ts'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout serapeum-api
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared-schemas package
        run: npm run build -w packages/shared-schemas

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Open PR in serapeum-app if spec changed
        env:
          GH_TOKEN: ${{ secrets.FLUTTER_SYNC_TOKEN }}
        run: |
          APP_REPO="cmacera/serapeum-app"
          FILE_PATH="docs/openapi.yaml"

          # Fetch current file from app repo (SHA + content)
          RESPONSE=$(gh api "repos/$APP_REPO/contents/$FILE_PATH" 2>/dev/null || echo "{}")
          CURRENT_SHA=$(echo "$RESPONSE" | jq -r '.sha // ""')
          CURRENT_CONTENT=$(echo "$RESPONSE" | jq -r '.content // ""' | tr -d '\n')

          # Base64-encode the freshly generated spec
          NEW_CONTENT=$(base64 -w0 < docs/openapi.yaml)

          # Exit early if nothing changed
          if [ "$CURRENT_CONTENT" = "$NEW_CONTENT" ]; then
            echo "No OpenAPI spec changes — skipping PR."
            exit 0
          fi

          BRANCH="chore/sync-openapi-$(date +%Y%m%d-%H%M%S)"
          MAIN_SHA=$(gh api "repos/$APP_REPO/git/refs/heads/main" --jq .object.sha)

          # Create branch via API
          gh api "repos/$APP_REPO/git/refs" \
            --method POST \
            --field ref="refs/heads/$BRANCH" \
            --field sha="$MAIN_SHA"

          # Update file via API — commits created this way are verified by GitHub
          if [ -n "$CURRENT_SHA" ]; then
            gh api "repos/$APP_REPO/contents/$FILE_PATH" \
              --method PUT \
              --field message="chore(openapi): sync spec from serapeum-api" \
              --field content="$NEW_CONTENT" \
              --field branch="$BRANCH" \
              --field sha="$CURRENT_SHA"
          else
            gh api "repos/$APP_REPO/contents/$FILE_PATH" \
              --method PUT \
              --field message="chore(openapi): sync spec from serapeum-api" \
              --field content="$NEW_CONTENT" \
              --field branch="$BRANCH"
          fi

          gh pr create \
            --repo "$APP_REPO" \
            --title "[SCHEMA] chore(openapi): sync OpenAPI spec from serapeum-api" \
            --body "$(cat <<'EOF'
          Auto-generated by the [sync-flutter workflow](https://github.com/cmacera/serapeum-api/actions/workflows/sync-flutter.yml) in **serapeum-api**.

          After merging, regenerate the Dart DTOs:
          \`\`\`sh
          dart run build_runner build --delete-conflicting-outputs
          \`\`\`
          EOF
          )" \
            --base main \
            --head "$BRANCH"
