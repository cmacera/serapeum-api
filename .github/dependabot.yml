version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    ignore:
      # Blocked by genkit pinning zod@^3.x — tracked in check-dependency-blockers.yml
      - dependency-name: "zod"
        versions: ["4.x", ">=4"]
      - dependency-name: "@asteasolutions/zod-to-openapi"
        versions: ["8.x", ">=8"]
      # Blocked by genkit pinning @opentelemetry/sdk-node@^0.52 (sdk-trace-base@1.25)
      - dependency-name: "@opentelemetry/exporter-trace-otlp-http"
        versions: [">=0.53"]
      - dependency-name: "@opentelemetry/sdk-trace-node"
        versions: [">1.25.x"]
    reviewers:
      - "cmacera"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group all non-breaking updates together
      genkit:
        patterns:
          - "@genkit-ai/*"
          - "genkit*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
